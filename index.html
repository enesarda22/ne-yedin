<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ne yedin? 🍽️</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --fg:#e8eaed; --muted:#9aa0aa;
          --accent:#34d399; --accent2:#10b981; --line:#262b34; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:17px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:40px 20px 60px; }
  h1 { font-size:1.7rem; margin:0 0 6px; }
  textarea { width:100%; min-height:120px; background:#0c0e12; color:var(--fg);
             border:1px solid var(--line); border-radius:12px; padding:14px;
             font:inherit; resize:vertical; }
  button { background:var(--accent); color:#05231a; border:0; border-radius:12px;
           padding:15px 20px; font-size:1.1rem; font-weight:700; width:100%;
           cursor:pointer; margin-top:12px; }
  button:hover { background:var(--accent2); }
  .msg { color:var(--accent); text-align:center; min-height:1.4em; margin:14px 0 0;
         font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <div id="main">
    <h1 id="q">Ne yedin? 🍽️</h1>
    <form id="f">
      <textarea name="yemek" required autofocus></textarea>
      <button type="submit">Gönder ✓</button>
    </form>
    <p class="msg" id="msg"></p>
  </div>
</div>

<script>
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbwEeriCqnsIWLaAr0T7t_Pzn_ZesPLtqmZ7LzJbFL9mZOSwF6IEPjrIzR-M5KMSNoq-dw/exec";

  // anonymous, random per-browser id (NO PII) — lets us split train/dev/TEST by
  // source (gate hygiene: never train on gate rows) + dedup one person's spam.
  // KVKK-clean: an opaque random token, not tied to any identity. Rides in the POST
  // body -> captured in the Sheet's `raw` column (no backend change needed).
  let sid = localStorage.getItem("nysid");
  if (!sid) {
    sid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
          : Date.now().toString(36) + Math.random().toString(16).slice(2);
    localStorage.setItem("nysid", sid);
  }

  // --- rotating question + a ROTATING SET of diverse examples per context ---
  // Each context carries several varied examples (picked at random) so no single food
  // is over-seeded across the corpus — reduces the elicitation bias the gate must avoid.
  // Examples model the real TERSE register (bare-space, varied foods/brands/quantities).
  const QUESTIONS = [
    ["Sabah kahvaltıda ne yedin? 🍳", ["yumurta peynir zeytin çay", "menemen ekmek", "simit çay", "yulaf süt muz", "2 dilim ekmek bal kaymak"]],
    ["Bugün öğlen ne yedin? 🍽️", ["mercimek çorba ekmek", "tavuklu pilav cacık", "kuru fasulye pilav turşu", "köfte ızgara", "nohut yemeği bulgur pilavı"]],
    ["Dün akşam ne yediniz? 🌙", ["karnıyarık pilav yoğurt", "balık salata", "makarna", "sebze yemeği ekmek", "tavuk sote"]],
    ["En son dışarı çıktığında ne yedin? 🛵", ["tavuklu dürüm ayran", "lahmacun şalgam", "büfeden hamburger", "pide", "kokoreç"]],
    ["Bugün ne atıştırdın? 🍫", ["kraker", "1 avuç kuruyemiş", "cikolata", "gofret kola", "meyve"]],
    ["En son ne içtin? ☕", ["türk kahvesi", "çay", "1 kutu kola", "ayran", "limonata"]],
    ["Canın bir şey çekti, ne yedin? 😋", ["bir kaşık nutella", "cips", "dondurma", "kek", "bisküvi"]],
    ["İşte/okulda ne yedin? 💻", ["kaşarlı tost çay", "kantinden döner", "poğaça ayran", "sandviç", "salata"]],
    ["Akşam yemeğinde ne vardı? 🍲", ["mantı yoğurt", "etli nohut pilav", "ızgara köfte sebze", "pizza", "güveç"]],
    ["Tatlı yedin mi, ne? 🍰", ["2 dilim baklava", "sütlaç", "künefe", "tulumba", "trileçe"]],
    ["Spordan sonra ne yedin? 🏋️", ["protein shake muz", "haşlanmış yumurta", "tavuk göğsü pilav", "yoğurt granola", "süt"]],
    ["Gece bir şey yedin mi? 🌚", ["1 kase yoğurt", "meyve", "peynir ekmek", "ayran", "biraz cikolata"]],
    ["Hafta sonu en güzel ne yedin? 🎉", ["serpme kahvaltı", "mangal", "iskender", "pizza", "menemen simit çay"]],
    ["Paket/sipariş ne yedin? 📦", ["lahmacun şalgam", "tavuklu pizza kola", "çiğköfte dürüm", "adana dürüm ayran", "tantuni"]],
    ["Bugün meyve/sebze yedin mi? 🍎", ["elma portakal muz", "salatalık domates", "1 avuç çilek", "havuç", "karpuz"]],
    ["Süt ürünü? 🥛", ["ayran", "süzme yoğurt", "beyaz peynir", "1 bardak süt", "kefir"]],
    ["Markadan bir şey? 🏷️", ["nutella ekmek", "eti browni", "ülker çikolatalı gofret", "danone meyveli yoğurt", "algida dondurma"]],
    ["Diyetteysen ne yedin? 🥗", ["haşlanmış yumurta salata", "ızgara tavuk", "yoğurt", "az şekerli kahve", "tam buğday ekmek peynir"]],
    ["Çocukla/ailece ne yediniz? 👨‍👩‍👧", ["makarna köfte", "pilav tavuk", "çorba ekmek", "patates kızartması", "süt bisküvi"]],
    ["Bir şey kaçırdın mı bugün? 📝", ["sabah simit", "ikindi çay kurabiye", "yolda gofret", "akşam çekirdek", "gece bir dilim pizza"]],
  ];
  let currentQ = "";
  function pickQ() {
    const [q, exs] = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    currentQ = q;
    document.getElementById('q').textContent = q;
    document.querySelector('textarea').placeholder = "ör: " + exs[Math.floor(Math.random() * exs.length)];
  }
  pickQ();

  // --- submit: send, clear, new question, let them add another ---
  const form = document.getElementById('f'), msg = document.getElementById('msg'),
        box = form.querySelector('textarea'), btn = form.querySelector('button');
  let sending = false;   // guard: the POST takes ~1-2s; block re-clicks meanwhile
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (sending) return;                 // ignore extra clicks while in flight
    const text = box.value.trim();
    if (!text) return;
    sending = true;
    btn.disabled = true;                 // visually + functionally locked
    const label = btn.textContent;
    btn.textContent = "Gönderiliyor…";
    try {
      await fetch(ENDPOINT, { method:"POST", mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({ yemek:text, soru:currentQ, sid:sid,
                               _ts:new Date().toISOString(), _src:"web-v2" })});
      box.value = "";
      pickQ();   // fresh question for the next entry
      msg.style.color = "";
      msg.textContent = "✓ kaydedildi! başka bir şey de ekleyebilirsin 🙂";
      box.focus();
      setTimeout(() => { msg.textContent = ""; }, 4000);
    } catch {
      msg.style.color = "#f472b6";
      msg.textContent = "gönderilemedi 😕 tekrar dener misin?";
    } finally {
      sending = false;                   // re-enable for the NEXT (intentional) entry
      btn.disabled = false;
      btn.textContent = label;
    }
  });
</script>
</body>
</html>
