<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ne yedin? 🍽️</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --fg:#e8eaed; --muted:#9aa0aa;
          --accent:#34d399; --accent2:#10b981; --line:#262b34; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:17px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:40px 20px 60px; }
  h1 { font-size:1.7rem; margin:0 0 6px; }
  .lead { color:var(--muted); margin:0 0 20px; }
  textarea { width:100%; min-height:120px; background:#0c0e12; color:var(--fg);
             border:1px solid var(--line); border-radius:12px; padding:14px;
             font:inherit; resize:vertical; }
  button { background:var(--accent); color:#05231a; border:0; border-radius:12px;
           padding:15px 20px; font-size:1.1rem; font-weight:700; width:100%;
           cursor:pointer; margin-top:12px; }
  button:hover { background:var(--accent2); }
  .msg { color:var(--accent); text-align:center; min-height:1.4em; margin:14px 0 0;
         font-weight:600; }
  .consent-line { color:var(--muted); font-size:.82rem; text-align:center; margin-top:24px; }
  .game-link { text-align:center; margin-top:30px; }
  .game-link a { color:var(--muted); font-size:.9rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:18px; margin:14px 0; min-height:96px; display:flex;
          align-items:center; justify-content:center; text-align:center; font-size:1.2rem; }
  .gbtns { display:flex; gap:10px; }
  .gbtns button { margin-top:0; }
  .hint { color:var(--muted); text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <div id="main">
    <h1 id="q">Ne yedin? 🍽️</h1>
    <form id="f">
      <textarea name="yemek" required autofocus></textarea>
      <button type="submit">Gönder ✓</button>
    </form>
    <p class="msg" id="msg"></p>

    <!-- mini game: appears inline here once real cards exist (no click to open) -->
    <div id="game" style="display:none">
      <p class="hint" style="margin-top:34px;font-weight:600">🤖 insan mı, yapay zekâ mı?</p>
      <div class="card"><span id="game-text"></span></div>
      <div class="gbtns">
        <button id="g-human" style="background:#60a5fa;color:#06203f">👤 İnsan</button>
        <button id="g-ai" style="background:#f472b6;color:#3f0626">🤖 Yapay zekâ</button>
      </div>
      <p class="hint" id="game-fb" style="min-height:1.2em;margin-top:12px"></p>
      <p class="hint">Skor: <span id="game-score">0</span> / <span id="game-seen">0</span></p>
      <p class="hint" id="game-final" style="font-weight:600"></p>
    </div>
  </div>
</div>

<script>
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbwEeriCqnsIWLaAr0T7t_Pzn_ZesPLtqmZ7LzJbFL9mZOSwF6IEPjrIzR-M5KMSNoq-dw/exec";

  // --- rotating question + matching placeholder: one box, varied real contexts ---
  const QUESTIONS = [
    ["Sabah kahvaltıda ne yedin? 🍳", "ör: 2 yumurta, beyaz peynir, zeytin, çay"],
    ["Bugün öğlen ne yedin? 🍽️", "ör: iş yerinde mercimek çorbası ve ekmek"],
    ["Dün akşam ne yediniz? 🌙", "ör: tavuklu pilav, cacık, salata"],
    ["En son dışarı çıktığında ne yedin? 🛵", "ör: köşedeki büfeden tavuklu dürüm + ayran"],
    ["Bugün ne atıştırdın? 🍫", "ör: eti browni ve 1 kutu kola"],
    ["En son ne içtin? ☕", "ör: sütlü orta şekerli türk kahvesi"],
    ["Canın bir şey çekti, ne yedin? 😋", "ör: gece dolaptan bir kaşık nutella"],
    ["İşte/okulda ne yedin? 💻", "ör: kantinden kaşarlı tost ve çay"],
    ["Akşam yemeğinde ne vardı? 🍲", "ör: karnıyarık, pilav, yoğurt"],
    ["Tatlı yedin mi, ne? 🍰", "ör: 2 dilim baklava"],
    ["Spordan sonra ne yedin? 🏋️", "ör: protein shake ve muz"],
    ["Gece bir şey yedin mi? 🌚", "ör: yatmadan 1 kase yoğurt"],
    ["Hafta sonu en güzel ne yedin? 🎉", "ör: kahvaltıda menemen, simit, çay"],
    ["Paket/sipariş ne yedin? 📦", "ör: lahmacun ve şalgam"],
  ];
  let currentQ = "";
  function pickQ() {
    const [q, ex] = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    currentQ = q;
    document.getElementById('q').textContent = q;
    document.querySelector('textarea').placeholder = ex;
  }
  pickQ();

  // --- submit: send, clear, new question, let them add another ---
  const form = document.getElementById('f'), msg = document.getElementById('msg'),
        box = form.querySelector('textarea');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = box.value.trim();
    if (!text) return;
    try {
      await fetch(ENDPOINT, { method:"POST", mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({ yemek:text, soru:currentQ,
                               _ts:new Date().toISOString(), _src:"web-v2" })});
      box.value = "";
      pickQ();   // fresh question for the next entry
      msg.textContent = "✓ kaydedildi! başka bir şey de ekleyebilirsin 🙂";
      box.focus();
      setTimeout(() => { msg.textContent = ""; }, 4000);
    } catch {
      msg.style.color = "#f472b6";
      msg.textContent = "gönderilemedi 😕 tekrar dener misin?";
    }
  });

  // --- inline mini game: auto-shows under the box ONCE pool.json has real cards ---
  const ROUNDS = 10; let pool = [], gi = 0, score = 0, judgments = [];
  (async function initGame(){
    try { pool = (await (await fetch('pool.json',{cache:'no-store'})).json())
                  .sort(()=>Math.random()-0.5).slice(0,ROUNDS); } catch { pool = []; }
    if (pool.length < 4) return;                 // not enough real cards yet -> stay hidden
    document.getElementById('game').style.display = 'block';
    card();
  })();
  function card(){ if(gi>=pool.length) return done();
    document.getElementById('game-text').textContent = pool[gi].text;
    document.getElementById('game-fb').textContent=''; document.getElementById('game-seen').textContent=gi; }
  function guess(g){ if(gi>=pool.length) return; const c=pool[gi];
    const truth=c.truth==='real'?'human':'ai', ok=g===truth; if(ok) score++;
    judgments.push({id:c.id,truth:c.truth,guess:g});
    const fb=document.getElementById('game-fb');
    fb.textContent=ok?'✓ doğru!':`✗ aslında ${truth==='human'?'insan 👤':'yapay zekâ 🤖'}`;
    document.getElementById('game-score').textContent=score; gi++; setTimeout(card,650); }
  let gameSent = false;
  function sendGame(){                       // flat payload, fires once, survives page-leave
    if (gameSent || judgments.length === 0) return;
    gameSent = true;
    try { fetch(ENDPOINT, { method:"POST", mode:"no-cors", keepalive:true,
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ mode:"oyun", score, seen:gi, n:pool.length,
        cevaplar: judgments.map(j=>`${j.id}:${j.truth}->${j.guess}`).join(" | "),
        _ts:new Date().toISOString() })}); } catch {}
  }
  function done(){ document.getElementById('game-final').textContent=
      `${score}/${gi} bildin.`+(score<=gi/2?' Yapay zekâ seni kandırdı 😄':' Keskin gözsün 👀');
    document.getElementById('game-text').parentElement.style.display='none';
    document.getElementById('g-human').parentElement.style.display='none';
    document.getElementById('game-fb').style.display='none';
    sendGame(); }
  // capture partial games too: send when the tab is hidden / closed
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') sendGame(); });
  window.addEventListener('pagehide', sendGame);
  document.getElementById('g-human').addEventListener('click',()=>guess('human'));
  document.getElementById('g-ai').addEventListener('click',()=>guess('ai'));
</script>
</body>
</html>
